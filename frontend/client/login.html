<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Вход — DeskBook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <i data-lucide="calendar-days" style="width:22px;height:22px"></i>
      </div>
      <div class="auth-logo-text">
        <h1>DeskBook</h1>
        <p>Система бронирования мест</p>
      </div>
    </div>
    <h2 class="auth-heading">Добро пожаловать</h2>
    <p class="auth-sub">Войдите в свой аккаунт</p>
    <form id="login-form" class="stack">
      <div class="field">
        <label for="username">Логин</label>
        <input id="username" type="text" placeholder="ivan.ivanov" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div id="error-msg" class="error-msg hidden"></div>
      <button type="submit" class="btn btn-primary btn-block" style="height:42px;font-size:15px">
        <i data-lucide="log-in" style="width:16px;height:16px"></i>
        Войти
      </button>
    </form>
    <p class="auth-links">Нет аккаунта? <a href="./register.html">Зарегистрироваться →</a></p>
  </div>
  <script>
  const API_BASE = "/api";
  const form = document.getElementById("login-form");
  const errorMsg = document.getElementById("error-msg");

  function isTokenExpired(token) {
    try {
      const payload = JSON.parse(atob(token.split(".")[1]));
      return payload.exp * 1000 < Date.now();
    } catch { return true; }
  }
  const _t = localStorage.getItem("user_token");
  if (_t && !isTokenExpired(_t) && localStorage.getItem("user_username")) {
    window.location.href = "./index.html";
  } else {
    localStorage.removeItem("user_token");
    localStorage.removeItem("user_username");
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorMsg.classList.add("hidden");
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    try {
      const resp = await fetch(`${API_BASE}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ username, password }),
      });
      if (!resp.ok) {
        const body = await resp.json().catch(() => ({}));
        throw new Error(body.detail || `Ошибка ${resp.status}`);
      }
      const { access_token } = await resp.json();
      localStorage.setItem("user_token", access_token);
      localStorage.setItem("user_username", username);
      window.location.href = "./index.html";
    } catch (e) {
      errorMsg.textContent = e.message;
      errorMsg.classList.remove("hidden");
    }
  });

  if (window.lucide) lucide.createIcons();
  </script>
</body>
</html>
